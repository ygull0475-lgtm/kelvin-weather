<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kelvin Weather Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🌡 Kelvin Weather Converter</h1>

    <p>Click the button to convert Kelvin (293) into Celsius, Fahrenheit and Newton.</p>

    <button onclick="convertTemperature()">Convert Temperature</button>

    <div class="result">
      <p id="celsius"></p>
      <p id="fahrenheit"></p>
      <p id="newton"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
